name: Build and Push Docker Image to ECR

on:
 push:
  branches:
  - main

jobs:
  build-and-push:
   runs-on: ubuntu-latest
   env:
      IMAGE_TAG: v${{ github.run_number }}
      
   steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t docker-test-ecr:${IMAGE_TAG} .

    - name: Tag Docker Image
      run: |
        docker tag docker-test-ecr:latest 915370161276.dkr.ecr.us-east-1.amazonaws.com/docker-test-ecr:latest

    - name: Push Docker Image to ECR
      run: |
        docker push 915370161276.dkr.ecr.us-east-1.amazonaws.com/docker-test-ecr:latest
